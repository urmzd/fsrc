[output]
dir = "./showcase"

[[output.formats]]
output_type = "png"

[font]
family = "MonaspiceNe Nerd Font"

[[scenes]]
type = "terminal"
name = "embed-dry-run"
theme = "dracula"
cwd = "."
cols = 100
rows = 40

[[scenes.interactions]]
type = "type"
text = "embed-src --dry-run README.md"
speed = 50
[[scenes.interactions]]
type = "key"
key = "enter"
[[scenes.interactions]]
type = "wait"
duration = 5000
